<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Panier</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="panier">

    <div class="panier-container">

        <h1 class="panier-title">
            Mon Panier 🛒
        </h1>

        <!-- PRODUITS -->
        <div id="cart-items"></div>

        <!-- TOTAL -->
        <div class="cart-total" id="cart-total">
            Total : 0 FCFA
        </div>

        <!-- FORMULAIRE -->
        <div class="commande-form">

            <input
            type="text"
            id="nom"
            placeholder="Votre nom">

            <input
            type="text"
            id="numero"
            placeholder="Numero deTéléphone">

            <input
            type="text"
            id="adresse"
            placeholder="Adresse livraison">

        </div>

        <!-- BOUTONS -->
        <button
        class="checkout-btn"
        onclick="commander()">

            Commander

        </button>

        <button
        class="delete-btn"
        onclick="clearCart()">

            Vider le panier

        </button>

    </div>

    <div class="retour">

        <a href="index.html">
            Retour à l'accueil
        </a>

    </div>

    <hr>

    <footer>

        <p>@Créé par Nawaf</p>

    </footer>

    <script src="panier.js"></script>

</body>

</html>
